<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all flex flex-col h-full">
  <div class="p-5 flex-1">
    <div class="flex justify-between items-start mb-4">
      <div class="flex flex-wrap gap-2">
        <span class="text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider" [class]="modalityClass">{{ report.modality }}</span>
        <span class="text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider" [class]="statusClass">{{ report.status }}</span>
      </div>
      <button class="text-slate-400 hover:text-primary transition-colors">
        <span class="material-symbols-outlined">download</span>
      </button>
    </div>
    <div class="mb-4">
      <h3 class="text-lg font-bold text-slate-900 dark:text-slate-100">{{ report.patientName }}</h3>
      <p class="text-slate-500 dark:text-slate-400 text-sm">ID: {{ report.id }}</p>
    </div>
    <div class="bg-slate-50 dark:bg-slate-800/80 rounded-lg p-4 mb-5 border border-slate-100 dark:border-slate-700/50">
      <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Final Diagnosis</p>
      <p class="text-sm text-slate-700 dark:text-slate-300 leading-relaxed font-medium">"{{ report.diagnosis }}"</p>
    </div>
    <div class="space-y-3 pt-2 border-t border-slate-100 dark:border-slate-800/50">
      <div class="flex items-center gap-2 text-slate-600 dark:text-slate-400">
        <span class="material-symbols-outlined text-sm">person</span>
        <span class="text-xs">{{ report.doctor }}</span>
      </div>
      <div class="flex items-center gap-2 text-slate-600 dark:text-slate-400">
        <span class="material-symbols-outlined text-sm">calendar_today</span>
        <span class="text-xs">{{ report.date }}</span>
      </div>
      
      @if (report.validated) {
        <div class="inline-flex items-center gap-1 text-[10px] font-bold text-emerald-600 dark:text-emerald-500 bg-emerald-50 dark:bg-emerald-500/10 px-2 py-0.5 rounded-full">
          <span class="material-symbols-outlined text-xs">check_circle</span>
          Validated &amp; Approved
        </div>
      }
    </div>
  </div>
  <button class="w-full bg-gradient-to-r from-cyan-600 to-cyan-500 hover:from-cyan-500 hover:to-cyan-400 text-white font-bold py-3 text-sm transition-all flex items-center justify-center gap-2">
    <span class="material-symbols-outlined text-lg">picture_as_pdf</span>
    Download PDF Report
  </button>
</div>
