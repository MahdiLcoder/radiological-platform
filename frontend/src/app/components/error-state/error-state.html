<div class="px-6 py-24 text-center bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm animate-in fade-in duration-500">
  <div class="flex flex-col items-center gap-3">
    <span class="material-symbols-outlined text-red-500 text-5xl">error</span>
    <p class="text-red-500 font-black text-xl">{{ message() }}</p>
    <button (click)="onRetry()" class="mt-4 px-6 py-2 bg-primary text-white rounded-lg font-bold hover:bg-primary/90 transition-all active:scale-95 shadow-lg shadow-primary/20">
      {{ actionText() }}
    </button>
  </div>
</div>
