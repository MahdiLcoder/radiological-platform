<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
  @for (stat of stats; track stat.title) {
    <div
      class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm flex items-center justify-between"
    >
      <div>
        <p class="text-slate-500 dark:text-slate-400 text-sm font-medium">{{ stat.title }}</p>
        <h3 class="text-3xl font-black mt-1 {{ stat.valueColorClass || '' }}">{{ stat.value }}</h3>
        <p
          class="text-xs font-bold mt-2 flex items-center gap-1 {{
            stat.trendColorClass || 'text-slate-500 dark:text-slate-400'
          }}"
        >
          @if (stat.trendIcon) {
            <span class="material-symbols-outlined text-sm">{{ stat.trendIcon }}</span>
          }
          {{ stat.trendText }}
        </p>
      </div>
      <div class="p-4 rounded-xl {{ stat.iconBgClass }} {{ stat.iconColorClass }}">
        <span class="material-symbols-outlined text-3xl">{{ stat.icon }}</span>
      </div>
    </div>
  }
</div>
