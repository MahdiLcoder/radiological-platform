<div class="clinical-metrics-grid">
  @for (stat of stats(); track stat.title) {
    <div class="metric-card group animate-in zoom-in-95 duration-500">
      <div class="metric-accent" [class]="stat.iconBgClass || 'bg-slate-100'"></div>
      
      <div class="metric-header">
        <div class="icon-orb" [class]="stat.iconBgClass || 'bg-slate-100'">
           <span class="material-symbols-outlined text-xl" [class]="stat.iconColorClass || 'text-slate-500'">{{ stat.icon }}</span>
        </div>
        <div class="flex flex-col">
          <span class="metric-label">{{ stat.title }}</span>
          <div class="flex items-baseline gap-2 mt-1">
            <h3 class="metric-value" [class]="stat.valueColorClass || 'text-slate-900'">{{ stat.value }}</h3>
            @if (stat.trendText) {
               <div class="trend-pill" [class]="stat.trendColorClass || 'text-slate-500'">
                  <span class="material-symbols-outlined text-[14px]">{{ stat.trendIcon }}</span>
                  {{ stat.trendText }}
               </div>
            }
          </div>
        </div>
      </div>

      <div class="metric-footer">
        <div class="progress-track">
           <div class="progress-fill" [class]="stat.iconBgClass || 'bg-slate-200'" [style.width]="'65%'"></div>
        </div>
        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">30D Analysis Cycle</span>
      </div>
    </div>
  }
</div>
