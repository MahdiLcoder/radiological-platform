<div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
  <div class="flex flex-wrap items-end gap-4">
    
    @for (filter of filters(); track filter.label) {
      <div class="flex-1 min-w-[200px]">
        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">
          {{ filter.label }}
        </label>
        
        @if (filter.type === 'select') {
          <div class="relative">
            <select class="w-full appearance-none bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm focus:ring-primary focus:border-primary">
              @for (opt of filter.options; track opt) {
                <option>{{ opt }}</option>
              }
            </select>
            @if (filter.icon) {
              <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">{{ filter.icon }}</span>
            } @else {
              <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
            }
          </div>
        } @else if (filter.type === 'text') {
          <div class="relative">
            <input 
              class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm focus:ring-primary focus:border-primary" 
              [placeholder]="filter.placeholder || ''" 
              type="text"
            />
            @if (filter.icon) {
              <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">{{ filter.icon }}</span>
            }
          </div>
        }
      </div>
    }

    <button class="bg-primary hover:bg-primary/90 text-white font-bold py-2 px-6 rounded-lg transition-all shadow-lg shadow-primary/20 flex items-center gap-2">
      @if (buttonIcon()) {
        <span class="material-symbols-outlined text-sm">{{ buttonIcon() }}</span>
      }
      {{ buttonText() }}
    </button>
  </div>
</div>
