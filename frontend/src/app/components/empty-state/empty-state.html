<div class="px-6 py-32 text-center bg-white dark:bg-slate-900 flex flex-col items-center animate-in fade-in zoom-in-95 duration-500 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm w-full">
  <div class="relative mb-8">
    <div class="size-24 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center">
      <span class="material-symbols-outlined text-6xl text-slate-200 dark:text-slate-700">{{ icon() }}</span>
    </div>
    @if (actionText()) {
      <div class="absolute -bottom-1 -right-1 size-8 rounded-full bg-primary flex items-center justify-center text-white border-4 border-white dark:border-slate-900">
        <span class="material-symbols-outlined text-base">add</span>
      </div>
    }
  </div>
  <h4 class="text-2xl font-black text-slate-900 dark:text-white mb-2">{{ title() }}</h4>
  <p class="text-slate-500 dark:text-slate-400 max-w-sm mx-auto mb-8 font-medium">
    {{ description() }}
  </p>
  
  @if (actionText()) {
    @if (actionLink()) {
      <a 
        [routerLink]="actionLink()" 
        class="bg-primary hover:bg-primary/90 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2 transition-all shadow-xl shadow-primary/25 hover:scale-105 active:scale-95"
      >
        <span class="material-symbols-outlined text-[20px]">{{ actionIcon() }}</span>
        {{ actionText() }}
      </a>
    } @else {
      <button 
        (click)="onActionClick()"
        class="bg-primary hover:bg-primary/90 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2 transition-all shadow-xl shadow-primary/25 hover:scale-105 active:scale-95"
      >
        <span class="material-symbols-outlined text-[20px]">{{ actionIcon() }}</span>
        {{ actionText() }}
      </button>
    }
  }
</div>
