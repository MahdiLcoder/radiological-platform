<header class="header-host">
  <!-- Search Bar -->
  <div class="flex-1 max-w-xl">
    <div class="relative group">
      <span
        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#4a6a85] group-focus-within:text-[#2b8cee] transition-colors pointer-events-none"
        >search</span
      >
      <input
        type="text"
        placeholder="Search patient ID, name, or study..."
        class="w-full bg-[#0d1b2a] border border-[#1e2d3d] rounded-lg pl-10 pr-4 py-2 text-sm text-white placeholder-[#4a6a85] outline-none focus:border-[#2b8cee] focus:ring-1 focus:ring-[#2b8cee] transition-all"
      />
    </div>
  </div>

  <!-- Right Side -->
  <div class="flex items-center gap-6">
    <!-- Icon Buttons -->
    <div class="flex items-center gap-3 border-r border-[#1e2d3d] pr-6">
      <button class="relative text-[#4a6a85] hover:text-[#2b8cee] transition-colors">
        <span class="material-symbols-outlined">notifications</span>
        <span
          class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-[#0d1b2a]"
        ></span>
      </button>
      <button class="text-[#4a6a85] hover:text-[#2b8cee] transition-colors">
        <span class="material-symbols-outlined">chat_bubble_outline</span>
      </button>
    </div>

    <!-- User Profile -->
    <div class="flex items-center gap-3">
      <div class="text-right hidden sm:block">
        <p class="text-sm font-bold text-white leading-none">Dr. Alexander Smith</p>
        <span
          class="inline-flex items-center rounded-md bg-[#2b8cee]/10 px-2 py-0.5 text-[10px] font-bold text-[#2b8cee] uppercase tracking-wider mt-1"
        >
          Chief Radiologist
        </span>
      </div>
      <div class="h-10 w-10 rounded-full bg-[#1e2d3d] border-2 border-[#2b8cee] overflow-hidden">
        <img
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuALfV6D7abHk1i6qQ4q4mW27Rk9R_F1eO70pxR10CHSuvH_sN2AqB-WPsgL_UweIvzF8jBJcRB84sIYZRLOngD3WQ-j3j77oDB2xXD6zFUxNguCMagS9DG2jVoTL0XLspbjT3tlAJNe1CR4lN5x0ISWARfSlKC3cm4Aux8lgylSzsRpaiiQ6M05Yp3LEHyPhUg_IdES1SZuLO8STWig7pPDLCOKLo55X4eKZR7QqMl8f5YiJmYqvzypHK_fBPN4vfoeJQzH9S_wOK0"
          alt="Doctor profile"
          class="h-full w-full object-cover"
        />
      </div>
    </div>
  </div>
</header>
