<header class="header-host bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-3 h-20 flex items-center sticky top-0 z-50">
  <!-- Search Bar -->
  <div class="flex-1 max-w-sm">
    <div class="relative group">
      <span
        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors pointer-events-none text-xl"
        >search</span
      >
      <input
        type="text"
        placeholder="Search reports..."
        class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-10 pr-4 py-2 text-sm text-slate-900 placeholder:text-slate-400 outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
      />
    </div>
  </div>

  <!-- Right Side -->
  <div class="flex items-center gap-4">
    <!-- Icon Buttons -->
    <div class="flex items-center gap-3">
      <button class="p-2 rounded-lg bg-slate-50 text-slate-600 hover:text-primary transition-colors">
        <span class="material-symbols-outlined">notifications</span>
      </button>
      <button class="p-2 rounded-lg bg-slate-50 text-slate-600 hover:text-primary transition-colors">
        <span class="material-symbols-outlined">settings</span>
      </button>
    </div>

    <div class="h-8 w-px bg-slate-200 mx-1 hidden md:block"></div>

    <!-- User Profile -->
    <div class="flex items-center gap-3 pl-1">
      <div class="text-right hidden md:block">
        <p class="text-sm font-bold text-slate-900 leading-none">Dr. Julian Vance</p>
        <p class="text-[10px] text-slate-500 font-medium mt-1 uppercase tracking-wider">Radiologist</p>
      </div>
      <div class="h-9 w-9 rounded-full ring-2 ring-primary/10 border border-primary/20 overflow-hidden">
        <img
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxmcDMztQDCY-3bjozN55Kn1K9jz5TK_NTSt1RX6fRx1kiEQKOcn8NZbLUCN8zp8S7DlxblnorTXZKknMI9BgvK72aniQR50gZisL4B-eJdNA1qRTJyV-bsrXe7NGDVM86zKmzNBZjpFPFFOzmgnndxvvbHFWhaBLhmv8xxATJ9BtlTBU05igqAB7L9QVNB65NOvN1sSt9uu6eO7HjxwBhoiJLjC77QqAZpv5x9UkSy-hgFMHIRnjkp2hVP1u8dNtt9A4DnQFifzM"
          alt="Doctor profile"
          class="h-full w-full object-cover"
        />
      </div>
    </div>
  </div>
</header>
