<header class="header-host bg-white dark:bg-[var(--color-surface-dark)] border-b border-slate-200 dark:border-slate-800">
  <!-- Search Bar -->
  <div class="flex-1 max-w-xl">
    <div class="relative group">
      <span
        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors pointer-events-none"
        >search</span
      >
      <input
        type="text"
        placeholder="Search patient ID, name, or study..."
        class="w-full bg-slate-50 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 rounded-lg pl-10 pr-4 py-2 text-sm text-slate-800 dark:text-slate-200 placeholder-slate-400 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"
      />
    </div>
  </div>

  <!-- Right Side -->
  <div class="flex items-center gap-6">
    <!-- Icon Buttons -->
    <div class="flex items-center gap-3 border-r border-slate-200 dark:border-slate-700 pr-6">
      <button class="relative text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">
        <span class="material-symbols-outlined">notifications</span>
        <span
          class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white dark:ring-slate-900"
        ></span>
      </button>
      <button class="text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">
        <span class="material-symbols-outlined">chat_bubble_outline</span>
      </button>
    </div>

    <!-- User Profile -->
    <div class="flex items-center gap-3">
      <div class="text-right hidden sm:block">
        <p class="text-sm font-bold text-slate-900 dark:text-slate-100 leading-none">Dr. Alexander Smith</p>
        <span
          class="inline-flex items-center rounded-md bg-primary/10 px-2 py-0.5 text-[10px] font-bold text-primary uppercase tracking-wider mt-1"
        >
          Chief Radiologist
        </span>
      </div>
      <div class="h-10 w-10 rounded-full bg-slate-100 dark:bg-slate-800 border-2 border-primary overflow-hidden">
        <img
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuALfV6D7abHk1i6qQ4q4mW27Rk9R_F1eO70pxR10CHSuvH_sN2AqB-WPsgL_UweIvzF8jBJcRB84sIYZRLOngD3WQ-j3j77oDB2xXD6zFUxNguCMagS9DG2jVoTL0XLspbjT3tlAJNe1CR4lN5x0ISWARfSlKC3cm4Aux8lgylSzsRpaiiQ6M05Yp3LEHyPhUg_IdES1SZuLO8STWig7pPDLCOKLo55X4eKZR7QqMl8f5YiJmYqvzypHK_fBPN4vfoeJQzH9S_wOK0"
          alt="Doctor profile"
          class="h-full w-full object-cover"
        />
      </div>
    </div>
  </div>
</header>
