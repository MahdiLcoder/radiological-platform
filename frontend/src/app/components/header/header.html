<header class="header-main-h-16 animate-in slide-in-from-top-4 duration-500">
  <div class="header-inner flex items-center justify-between h-full px-8">
    <!-- Left: Context / Path -->
    <div class="flex items-center gap-6">
       <button class="md:hidden text-slate-400 hover:text-primary transition-all">
          <span class="material-symbols-outlined">menu_open</span>
       </button>
       <div class="clinical-system-status">
          <div class="status-orb-pulse"></div>
          <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none">Status: </span>
          <span class="text-[9px] font-extrabold text-emerald-500 uppercase tracking-widest leading-none">Registry Synchronized</span>
       </div>
    </div>

    <!-- Center: Search or Branding (Mobile focal point) -->
    <div class="hidden lg:flex items-center gap-2">
       <div class="px-3 py-1 bg-primary/5 rounded-lg border border-primary/10 text-[9px] font-black text-primary uppercase tracking-widest">
          PACS NODE: CENTRAL_HUB_01
       </div>
    </div>

    <!-- Right: Actions & Identity -->
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2 border-r border-slate-100 pr-4">
        <button class="tool-btn-premium group" title="System Notifications">
          <span class="material-symbols-outlined text-xl group-hover:rotate-12 transition-transform">notifications</span>
          <div class="notification-blip"></div>
        </button>
        <button class="tool-btn-premium group" (click)="authService.logout()" title="Logout Sequence">
          <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">logout</span>
        </button>
      </div>

      <div class="header-professional-info flex items-center gap-3 pl-2">
         <div class="flex flex-col items-end">
            <span class="text-[10px] font-black text-slate-900 uppercase tracking-widest">{{ profileQuery.data()?.username }}</span>
            <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">{{ profileQuery.data()?.role }}</span>
         </div>
      </div>
    </div>
  </div>
</header>
