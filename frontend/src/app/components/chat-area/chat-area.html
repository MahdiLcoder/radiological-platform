<div class="flex flex-col h-full">
  <!-- Empty State -->
  <div
    *ngIf="!receiverId()"
    class="absolute inset-0 flex flex-col items-center justify-center bg-white/50 backdrop-blur-sm z-10"
  >
    <app-empty-state
      icon="chat_bubble"
      title="Select a conversation"
      description="Connect with clinical staff to coordinate action plans."
    >
    </app-empty-state>
  </div>

  <!-- Active Chat Content -->
  <ng-container *ngIf="receiverId()">
    <!-- Chat Header -->
    <header
      class="px-8 py-4 bg-white/80 backdrop-blur-md border-b border-slate-200 shrink-0 sticky top-0 z-20 shadow-sm flex items-center justify-between"
    >
      <div class="flex items-center gap-4">
        <div
          class="size-12 rounded-2xl bg-indigo-50 border border-indigo-100 flex items-center justify-center text-indigo-600 font-black"
        >
          {{ getUserInitials(currentConversation()?.otherUser) }}
        </div>
        <div>
          <h2 class="text-lg font-black text-slate-900 tracking-tight flex items-center gap-2">
            {{ currentConversation()?.otherUser?.first_name }}
            {{ currentConversation()?.otherUser?.last_name }}
            <span
              class="px-2 py-0.5 rounded bg-emerald-50 text-emerald-600 text-[10px] font-black uppercase tracking-widest border border-emerald-100"
              >Online</span
            >
          </h2>
          <p class="text-[11px] font-bold uppercase tracking-widest text-slate-500 mt-0.5">
            {{ currentConversation()?.otherUser?.role }}
          </p>
        </div>
      </div>
    </header>

    <!-- Messages Stream -->
    <div class="flex-1 overflow-y-auto p-6 hide-scrollbar" #messagesContainer>
      <div *ngIf="isLoading()" class="flex justify-center p-8">
        <app-loading-state message="Decrypting history..."></app-loading-state>
      </div>

      <ng-container *ngIf="!isLoading()">
        <div
          *ngFor="let message of messages(); let i = index"
          class="flex w-full message-animate px-4 mt-1"
          [class.mt-4]="isFirstInGroup(message, i)"
          [ngClass]="isMine(message) ? 'justify-end' : 'justify-start'"
        >
          <div
            class="max-w-[70%] relative group flex flex-col gap-1"
            [ngClass]="isMine(message) ? 'items-end' : 'items-start'"
          >
            <div class="px-4 py-2 leading-snug" [ngClass]="getMessageBubbleClasses(message, i)">
              <p class="text-[14px] whitespace-pre-wrap">{{ message.content }}</p>
            </div>
            <div
              *ngIf="isLastInGroup(message, i)"
              class="flex items-center gap-1 mt-0.5 px-1 opacity-0 group-hover:opacity-100 transition-all duration-200"
              [ngClass]="isMine(message) ? 'justify-end' : 'justify-start'"
            >
              <span class="text-[11px] font-medium text-slate-400">
                {{ message.created_at | date: 'MMM d, h:mm a' }}
              </span>
              <span
                *ngIf="isMine(message)"
                class="material-symbols-outlined text-[14px] text-indigo-400"
                >done_all</span
              >
            </div>
          </div>
        </div>
      </ng-container>
    </div>

    <!-- Input Area -->
    <footer class="p-4 bg-white border-t border-slate-200 shrink-0">
      <div
        class="max-w-4xl mx-auto flex items-end gap-3 bg-slate-50 border border-slate-200 rounded-t-2xl rounded-b-3xl p-2 shadow-inner focus-within:border-indigo-300 focus-within:ring-2 focus-within:ring-indigo-100 transition-all"
      >
        <button
          class="size-10 rounded-full hover:bg-slate-200 flex items-center justify-center text-slate-400 transition-colors shrink-0"
        >
          <span class="material-symbols-outlined text-xl">attach_file</span>
        </button>

        <textarea
          [(ngModel)]="newMessage"
          (keyup.enter)="onKeyUp($event)"
          placeholder="Discuss clinical findings securely..."
          class="flex-1 max-h-32 min-h-[44px] bg-transparent border-none outline-none resize-none py-3 text-[15px] text-slate-800 placeholder-slate-400 custom-scrollbar"
          rows="1"
        ></textarea>

        <button
          (click)="sendMessage()"
          [disabled]="!newMessage.trim()"
          class="size-12 rounded-full flex items-center justify-center transition-all shrink-0 shadow-md"
          [ngClass]="
            newMessage.trim()
              ? 'bg-indigo-600 hover:bg-indigo-700 text-white'
              : 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none'
          "
        >
          <span class="material-symbols-outlined" [class.ml-1]="newMessage.trim()">send</span>
        </button>
      </div>
    </footer>
  </ng-container>
</div>
