<div class="welcome-banner animate-in fade-in slide-in-from-top-4 duration-700">
  <div class="welcome-background">
    <div class="bg-pulse"></div>
    <div class="bg-dots"></div>
  </div>
  
  <div class="welcome-content-wrapper">
    <div class="welcome-text-area">
      <div class="welcome-icon-box" @if (buttonIcon()) { title="{{ buttonIcon() }}" }>
         <span class="material-symbols-outlined">{{ buttonIcon() || 'clinical_notes' }}</span>
      </div>
      <div>
        <h2 class="welcome-title text-3xl font-black tracking-tight text-slate-900">{{ title() }}</h2>
        <p class="welcome-subtitle text-slate-500 font-medium mt-1">{{ subtitle() }}</p>
      </div>
    </div>
    
    <div class="welcome-actions">
      <ng-content></ng-content>
      
      @if (buttonText()) {
        <button
          [routerLink]="buttonLink()"
          class="welcome-primary-btn"
        >
          <span>{{ buttonText() }}</span>
          @if (buttonIcon()) {
            <span class="material-symbols-outlined icon-glow">{{ buttonIcon() }}</span>
          }
        </button>
      }
    </div>
  </div>
</div>
