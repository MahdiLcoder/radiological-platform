<div class="patients-page animate-in fade-in slide-in-from-bottom-4 duration-500">
  <app-welcome-section
    title="Clinical Registry"
    subtitle="Access and manage comprehensive radiological records for all registered patients."
    buttonText="Register Patient"
    buttonIcon="person_add"
    buttonLink="/dashboard/create-patient"
  ></app-welcome-section>

  <!-- Clinical Filter Console -->
  <app-filters-section
    [searchPlaceholder]="'Search by MRN, Name...'"
    [searchIcon]="'person_search'"
    [(searchValue)]="searchQuery"
    [tabs]="filterTabs"
    [(activeTab)]="activeTab"
    (filterChange)="onFilterChange()"
    (resetClicked)="searchQuery.set(''); activeTab.set('ALL'); onFilterChange()"
  ></app-filters-section>

  <!-- Records Repository -->
  <div class="clinical-list-area mt-8 min-h-[400px]">
    @if (patientsQuery.isPending()) {
      <app-loading-state message="Accessing Central Registry..."></app-loading-state>
    } @else if (patientsQuery.isError()) {
      <app-error-state
        message="Registry Interruption"
        actionText="Re-sync Registry"
        (retry)="patientsQuery.refetch()"
      >
      </app-error-state>
    } @else {
      @if (worklistData().length > 0) {
        <app-worklist-table
          [columns]="tableColumns"
          [data]="worklistData()"
          [totalItems]="totalItems()"
          [currentPage]="currentPage()"
          [totalPages]="totalPages()"
          (prevPage)="prevPage()"
          (nextPage)="nextPage()"
        >
        </app-worklist-table>
      } @else {
        <app-empty-state
          icon="person_search"
          title="Zero Registry Hits"
          description="The query profile matched no clinical records. Consider relaxing protocol constraints."
          actionText="Clear Constraints"
          actionIcon="clear_all"
          (actionClick)="searchQuery.set(''); activeTab.set('ALL'); onFilterChange()"
        >
        </app-empty-state>
      }
    }
  </div>
</div>
