<div class="flex-1 overflow-y-auto w-full medical-grid">
  <div class="px-8 pt-8 pb-4">
    <app-welcome-section
      title="Diagnostic Reports"
      subtitle="Manage and review patient findings from all departments."
    >
      <div class="flex items-center gap-3 bg-white border border-slate-200 rounded-lg p-1.5 shadow-sm">
        <label class="text-xs font-bold uppercase tracking-wider text-slate-500 pl-3">Modality:</label>
        <div class="relative w-40">
          <select class="w-full appearance-none bg-slate-50 border-none rounded-md py-2 px-3 text-sm font-bold focus:ring-2 focus:ring-primary focus:outline-none cursor-pointer">
            <option>All Modalities</option>
            <option>MRI</option>
            <option>CT Scan</option>
            <option>X-Ray</option>
          </select>
          <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
        </div>
      </div>
    </app-welcome-section>
  </div>
  
  <div class="px-8 pb-8 space-y-8">
    <!-- Filters Section -->
    <app-filters-section 
      [filters]="reportFilters" 
      buttonText="Apply Filters" 
      buttonIcon="filter_list">
    </app-filters-section>
    
    <!-- Reports Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (report of reports; track report.id) {
        <app-report-card [report]="report"></app-report-card>
      }
    </div>
    
    <!-- Empty State -->
    <div class="hidden flex-col items-center justify-center py-20 px-4 bg-white border border-dashed border-slate-200 rounded-2xl mt-8">
      <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-6">
        <span class="material-symbols-outlined text-4xl text-slate-400">file_copy</span>
      </div>
      <h3 class="text-xl font-bold text-slate-900 mb-2">No reports match filters</h3>
      <p class="text-slate-500 text-center max-w-sm">We couldn't find any diagnostic reports matching your current filter criteria. Try adjusting the modality or date range.</p>
      <button class="mt-6 text-primary font-semibold hover:underline">Clear all filters</button>
    </div>
    
    <!-- Pagination -->
    <div class="mt-12 flex items-center justify-center gap-2">
      <button class="p-2 rounded-lg border border-slate-200 hover:bg-slate-50 transition-colors text-slate-600">
        <span class="material-symbols-outlined">chevron_left</span>
      </button>
      <button class="w-10 h-10 rounded-lg bg-primary text-white font-bold">1</button>
      <button class="w-10 h-10 rounded-lg border border-slate-200 hover:bg-slate-50 transition-colors text-slate-600 font-medium">2</button>
      <button class="w-10 h-10 rounded-lg border border-slate-200 hover:bg-slate-50 transition-colors text-slate-600 font-medium">3</button>
      <span class="mx-2 text-slate-400">...</span>
      <button class="w-10 h-10 rounded-lg border border-slate-200 hover:bg-slate-50 transition-colors text-slate-600 font-medium">12</button>
      <button class="p-2 rounded-lg border border-slate-200 hover:bg-slate-50 transition-colors text-slate-600">
        <span class="material-symbols-outlined">chevron_right</span>
      </button>
    </div>
  </div>

</div>
