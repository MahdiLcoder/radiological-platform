<div class="all-images-page animate-in fade-in slide-in-from-bottom-4 duration-500">
  <app-welcome-section
    title="Clinical Imaging Archive"
    subtitle="Comprehensive database of all radiological studies uploaded and processed by the system."
    buttonText="Import Scan"
    buttonIcon="cloud_upload"
    buttonLink="/dashboard/upload"
  ></app-welcome-section>

  <!-- Clinical Filter Console -->
  <div class="clinical-filter-console mt-[-1.5rem] relative z-10 animate-in fade-in zoom-in-95 duration-700 delay-200">
    <div class="console-group">
      <div class="console-input-wrapper group">
        <span class="material-symbols-outlined absolute left-3 text-slate-400 group-focus-within:text-primary transition-colors text-xl">image_search</span>
        <input
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event); onFilterChange()"
          class="console-input !w-80"
          placeholder="Search by Patient MRN, Name..."
          type="text"
        />
      </div>

      <div class="console-select-wrapper group">
        <span class="material-symbols-outlined console-select-icon">radiology</span>
        <select
          [ngModel]="selectedModality()"
          (ngModelChange)="selectedModality.set($event); onFilterChange()"
          class="console-select !pl-10 !pr-10"
        >
          <option value="">All Modalities</option>
          <option value="X-Ray">X-Ray</option>
          <option value="CT Scan">CT Scan</option>
          <option value="MRI">MRI</option>
        </select>
        <span class="material-symbols-outlined console-select-arrow">expand_more</span>
      </div>

      <div class="console-select-wrapper group">
        <span class="material-symbols-outlined console-select-icon">analytics</span>
        <select
          [ngModel]="selectedStatus()"
          (ngModelChange)="selectedStatus.set($event); onFilterChange()"
          class="console-select !pl-10 !pr-10"
        >
          <option value="">All Lifecycle</option>
          <option value="Pending">Queue: Pending</option>
          <option value="Analyzed">Pipeline: Analyzed</option>
          <option value="Validated">Session: Validated</option>
        </select>
        <span class="material-symbols-outlined console-select-arrow">expand_more</span>
      </div>
    </div>

    <div class="console-group">
      <button (click)="imagesQuery.refetch()" class="console-action-btn">
         <span class="material-symbols-outlined text-[18px]">sync</span>
         REFRESH
      </button>
      <button 
        (click)="searchQuery.set(''); selectedModality.set(''); selectedStatus.set(''); onFilterChange()" 
        class="console-reset-btn"
        title="Reset Console"
      >
        <span class="material-symbols-outlined">refresh</span>
      </button>
    </div>
  </div>

  <div class="min-h-96 mt-10">
    @if (imagesQuery.isPending()) {
       <div class="p-32 flex flex-col items-center justify-center gap-4 bg-white/50 rounded-3xl border border-slate-100">
          <div class="w-10 h-10 border-4 border-primary/10 border-t-primary rounded-full animate-spin"></div>
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-4">Accessing Secure Archive...</p>
       </div>
    } @else if (imagesQuery.isError()) {
       <div class="p-20 text-center bg-rose-50/20 border border-dashed border-rose-200 rounded-3xl">
          <span class="material-symbols-outlined text-rose-500 text-6xl mb-4">cloud_off</span>
          <h3 class="text-xl font-extrabold text-slate-900 tracking-tight">Archive Offline</h3>
          <button (click)="imagesQuery.refetch()" class="mt-8 action-btn-pax mx-auto">Retry Protocol</button>
       </div>
    } @else {
      <app-worklist-table 
        [columns]="tableColumns" 
        [data]="worklistData()"
        [totalItems]="totalItems()"
        [currentPage]="currentPage()"
        [totalPages]="totalPages()"
        (prevPage)="prevPage()"
        (nextPage)="nextPage()">
      </app-worklist-table>
    }
  </div>
</div>
