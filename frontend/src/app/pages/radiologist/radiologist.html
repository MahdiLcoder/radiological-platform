<div class="flex-1 overflow-y-auto p-8 space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
  <!-- Welcome Section -->
  <app-welcome-section
    title="Recent Uploads &amp; AI Queue"
    subtitle="Real-time status of clinical imaging and AI diagnostic pipeline."
    buttonText="Upload New Scan"
    buttonIcon="add_circle"
  ></app-welcome-section>
  
  @if (imagesQuery.isPending()) {
    <div class="px-6 py-24 text-center bg-white rounded-xl border border-slate-200 shadow-sm">
      <div class="flex flex-col items-center gap-3">
        <div class="size-10 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
        <p class="text-slate-500 font-bold text-lg">Loading worklist...</p>
      </div>
    </div>
  } @else if (imagesQuery.isError()) {
    <div class="px-6 py-24 text-center bg-white rounded-xl border border-slate-200 shadow-sm">
      <div class="flex flex-col items-center gap-3">
        <span class="material-symbols-outlined text-red-500 text-5xl">error</span>
        <p class="text-red-500 font-black text-xl">Failed to load worklist</p>
        <button (click)="imagesQuery.refetch()" class="mt-4 px-6 py-2 bg-primary text-white rounded-lg font-bold hover:bg-primary/90 transition-all">
          Try again
        </button>
      </div>
    </div>
  } @else {
    <app-stats-summary [stats]="summaryStats()"></app-stats-summary>

    <div class="flex items-center justify-between pt-4">
      <h2 class="text-xl font-bold text-slate-900">Recent Scans</h2>
      <a routerLink="/dashboard/all-images" class="text-sm font-bold text-primary hover:underline flex items-center gap-1 bg-primary/10 px-4 py-2 rounded-lg transition-all hover:bg-primary/20">
        View All Scans <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
      </a>
    </div>

    <app-worklist-table 
      [columns]="tableColumns" 
      [data]="worklistData()"
      [hideFooter]="true"
    ></app-worklist-table>
  }
</div>
