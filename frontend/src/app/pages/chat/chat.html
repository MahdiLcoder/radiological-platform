<!-- Main Chat Layout -->
<div
  class="flex h-[calc(100vh-8rem)] max-h-[calc(100vh-4rem)] bg-slate-50/30 overflow-hidden font-sans"
>
  <!-- Sidebar Container -->
  <aside class="w-full max-w-[380px] bg-white border-r border-slate-200 flex flex-col shrink-0">
    <app-chat-sidebar
      [conversations]="conversations()"
      [selectedConversationId]="receiverId()"
      [currentUserId]="currentUserId"
      (conversationSelected)="onConversationSelected($event)"
    >
    </app-chat-sidebar>
  </aside>

  <!-- Main Chat Area -->
  <main class="flex-1 flex flex-col min-w-0 relative bg-slate-50/30">
    <app-chat-area
      [currentUserId]="currentUserId"
      [receiverId]="receiverId()"
      [currentConversation]="currentConversation()"
      [messages]="messages()"
      [isLoading]="messagesQuery.isPending()"
      (messageSent)="onMessageSent($event)"
      (scrollToBottom)="scrollToBottom()"
    >
    </app-chat-area>
  </main>
</div>
